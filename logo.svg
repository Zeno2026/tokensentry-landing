<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0a0b0d"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="url(#shieldGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Shield body -->
  <path d="M256 72 L400 140 L400 280 C400 360 340 420 256 448 C172 420 112 360 112 280 L112 140 Z" 
        fill="url(#shieldGrad)" opacity="0.9" filter="url(#glow)"/>
  
  <!-- Shield inner -->
  <path d="M256 96 L380 156 L380 276 C380 346 326 400 256 424 C186 400 132 346 132 276 L132 156 Z" 
        fill="url(#innerGrad)" opacity="0.6"/>
  
  <!-- Shield highlight -->
  <path d="M256 96 L380 156 L380 200 C300 180 200 180 132 200 L132 156 Z" 
        fill="white" opacity="0.08"/>
  
  <!-- Eye/scanner icon - center of shield -->
  <circle cx="256" cy="240" r="56" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>
  <circle cx="256" cy="240" r="24" fill="white" opacity="0.9"/>
  <circle cx="256" cy="240" r="10" fill="#3b82f6"/>
  
  <!-- Scan lines -->
  <line x1="186" y1="240" x2="210" y2="240" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="302" y1="240" x2="326" y2="240" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="256" y1="170" x2="256" y2="194" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <line x1="256" y1="286" x2="256" y2="310" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Checkmark at bottom of shield -->
  <path d="M230 340 L250 360 L286 320" fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
